<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru - SMP Plus Al-Istiqomah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <nav class="navbar navbar-dark header-custom p-3">
    <div class="container d-flex align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="logo.png" alt="Logo" width="40" height="40" class="d-inline-block align-text-top me-3 logo-nav">
            <span class="h1 mb-0" style="font-size: 1.5rem;">SMP PLUS AL-ISTIQOMAH</span>
        </a>
        <a href="Login.html" class="btn btn-outline-light btn-sm ms-auto">Keluar</a>
    </div>
</nav>

    <div class="container mt-5">
        <h3 class="mb-4">Data Guru</h3>
        
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card card-guru shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <img src="foto/foto.jpg" alt="Foto Guru" class="profile-img me-3">
                        <div>
                            <h5 class="mb-1">Ziyad Ahmad Fauzan</h5>
                            <p class="text-muted small mb-2">Guru Informatika</p>
                            <button class="btn btn-primary btn-sm" onclick="bukaProfil('Ziyad Ahmad Fauzan')">Upload Berkas & Absen</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card card-guru shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <img src="foto/Cecep.jpeg" alt="Foto Guru" class="profile-img me-3">
                        <div>
                            <h5 class="mb-1">Cecep Ihsan Iskandar</h5>
                            <p class="text-muted small mb-2">Guru IPS</p>
                            <button class="btn btn-primary btn-sm" onclick="bukaProfil('Cecep Ihsan Iskandar')">Upload Berkas & Absen</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card card-guru shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <img src="foto/2.jpg" alt="Foto Guru" class="profile-img me-3">
                        <div>
                            <h5 class="mb-1">Ziyad Ahmad Fauzan</h5>
                            <p class="text-muted small mb-2">Guru Informatika</p>
                            <button class="btn btn-primary btn-sm" onclick="bukaProfil('Ziyad Ahmad Fauzan')">Upload Berkas & Absen</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card card-guru shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <img src="foto.jpg" alt="Foto Guru" class="profile-img me-3">
                        <div>
                            <h5 class="mb-1">Cecep Ihsan Iskandar, S.Kom.</h5>
                            <p class="text-muted small mb-2">Guru IPS</p>
                            <button class="btn btn-primary btn-sm" onclick="bukaProfil('Cecep Ihsan Iskandar')">Upload Berkas & Absen</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        

        <div id="areaProfil" class="mt-4 d-none">
            <div class="card detail-card p-4">
                <h4 id="namaGuru">Detail Guru: -</h4>
                <div class="row mt-3 text-center">
                    <div class="col-6">
                        <button class="btn btn-success w-100 p-3" onclick="alert('Memulai Face ID...')">
                            <b>ABSENSI (FACE ID)</b>
                        </button>
                         
                    </div>
                    <div class="col-6">
                        <button class="btn btn-info text-white w-100 p-3" data-bs-toggle="modal" data-bs-target="#modalUpload">


    <b>UPLOAD BERKAS</b>
</button>

<div class="modal fade" id="modalUpload" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius: 15px;">
            <div class="modal-header">
                <h5 class="modal-title">Upload Dokumen Guru</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formUploadBerkas">
                    <div class="mb-3">
                        <label class="form-label">Jenis Berkas</label>
                        <select class="form-select custom-input" required>
                            <option value="">-- Pilih Jenis --</option>
                            <option value="sk">SK Mengajar</option>
                            <option value="ijazah">Ijazah</option>
                            <option value="sertifikat">Sertifikat Pelatihan</option>
                            <option value="lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Pilih File (PDF/JPG/PNG)</label>
                        <input type="file" class="form-control custom-input" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 p-2">Unggah Sekarang</button>
                </form>
            </div>
            <div class="modal-footer bg-light" style="border-bottom-left-radius: 15px; border-bottom-right-radius: 15px;">
                <p class="small text-muted mb-0">Maksimal ukuran file: 2MB</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function bukaProfil(nama) {
            document.getElementById('areaProfil').classList.remove('d-none');
            document.getElementById('namaGuru').innerText = "Profil: " + nama;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
