<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SMP Plus Al-Istiqomah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <img src="logo.png" alt="Logo SMP Plus Al-Istiqomah" class="logo-img">
                <h4 class="mt-3 school-name">SMP PLUS AL-ISTIQOMAH</h4>
                <p class="text-muted small">Silakan masuk dengan akun Anda</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">NIP / Username</label>
                    <input type="text" id="username" class="form-control custom-input" placeholder="Masukkan NIP" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control custom-input" placeholder="********" required>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100">MASUK KE SISTEM</button>
            </form>
            
            <div class="mt-4 text-center">
                <small class="text-muted">Lupa password? Hubungi Admin IT Sekolah</small>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
